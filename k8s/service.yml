apiVersion: v1
kind: Service
metadata:
  name: dpe-backend-svc
  namespace: dpe-ns
spec:
  selector:
    app: dpe-backend
  type: ClusterIP
  # sessionAffinity: None
  # sessionAffinityConfig:
  #   clientIP:
  #     timeoutSeconds: 10800
  ports:
  - name: backend
    protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30800