apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dpe-ingress
  namespace: dpe-ns
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true" 
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - dpe.hicloud.co.in
    secretName: dpe-tls-secret
  rules:
  - host: dpe.hicloud.co.in
    http:
      paths:
      - path: /apps
        pathType: Prefix
        backend:
          service:
            name: dpe-frontend-svc
            port:
              number: 80